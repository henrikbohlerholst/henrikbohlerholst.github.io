<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- Sky at dusk -->
  <rect width="320" height="200" fill="#1a1a2e"/>
  <!-- Stars -->
  <circle cx="30" cy="20" r="1.5" fill="#fff" opacity="0.9"/>
  <circle cx="80" cy="35" r="1" fill="#fff" opacity="0.8"/>
  <circle cx="130" cy="15" r="1.5" fill="#fff" opacity="0.95"/>
  <circle cx="190" cy="30" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="240" cy="10" r="1.5" fill="#fff" opacity="0.85"/>
  <circle cx="300" cy="40" r="1" fill="#fff" opacity="0.9"/>
  <circle cx="55" cy="55" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="160" cy="50" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="270" cy="25" r="1" fill="#fff" opacity="0.75"/>
  <!-- Moon -->
  <circle cx="60" cy="50" r="22" fill="#e8e0c8"/>
  <circle cx="70" cy="44" r="22" fill="#1a1a2e"/>
  <!-- Sea / water -->
  <rect y="130" width="320" height="70" fill="#16213e"/>
  <!-- Moon reflection -->
  <ellipse cx="60" cy="155" rx="8" ry="20" fill="#e8e0c8" opacity="0.25"/>
  <!-- Horizon glow -->
  <rect y="125" width="320" height="10" fill="#2d4a6e" opacity="0.5"/>
</svg>
