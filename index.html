<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Henrik Bohler Holst</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="avatar-wrapper">
        <img
          class="avatar"
          src="images/avatar.svg"
          alt="Profile picture of Henrik Bohler Holst"
        />
      </div>
      <h1>Henrik Bohler Holst</h1>
      <p>Developer &amp; Explorer</p>
    </header>

    <main>
      <section>
        <h2>About</h2>
        <p>
          Welcome to my personal website. I enjoy building things for the web,
          exploring the outdoors, and capturing the world through a lens.
        </p>
      </section>

      <section>
        <h2>Gallery</h2>
        <div class="gallery">
          <figure>
            <img src="images/landscape.svg" alt="Mountain landscape under a sunny sky" />
            <figcaption>Mountain hike</figcaption>
          </figure>
          <figure>
            <img src="images/sunset.svg" alt="Warm sunset over the sea" />
            <figcaption>Sunset at sea</figcaption>
          </figure>
          <figure>
            <img src="images/night.svg" alt="Moonlit night sky reflected on water" />
            <figcaption>Night sky</figcaption>
          </figure>
          <figure>
            <img src="images/forest.svg" alt="A forest trail winding between tall trees" />
            <figcaption>Forest trail</figcaption>
          </figure>
        </div>
      </section>

      <section>
        <h2>Contact</h2>
        <p>
          Find me on
          <a href="https://github.com/henrikbohlerholst">GitHub</a>.
        </p>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Henrik Bohler Holst</p>
    </footer>
  </body>
</html>
