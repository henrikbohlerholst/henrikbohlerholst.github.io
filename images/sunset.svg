<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- Sky -->
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#f7931e"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#skyGrad)"/>
  <!-- Sea -->
  <rect y="130" width="320" height="70" fill="#1a6b8a"/>
  <!-- Sun -->
  <circle cx="160" cy="130" r="35" fill="#fff176" opacity="0.9"/>
  <!-- Reflection -->
  <ellipse cx="160" cy="150" rx="20" ry="30" fill="#fff176" opacity="0.2"/>
  <!-- Clouds -->
  <ellipse cx="60" cy="40" rx="35" ry="15" fill="#fff" opacity="0.4"/>
  <ellipse cx="85" cy="35" rx="25" ry="13" fill="#fff" opacity="0.4"/>
  <ellipse cx="240" cy="55" rx="30" ry="12" fill="#fff" opacity="0.35"/>
</svg>
